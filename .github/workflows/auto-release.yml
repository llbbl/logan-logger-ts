name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write # Required for npm OIDC and JSR publishing

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      tag: ${{ steps.version.outputs.next }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Determine next version
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          commits=$(git log "$latest_tag"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$commits" | grep -qE "^feat(\(.+\))?!:|^fix(\(.+\))?!:|^refactor(\(.+\))?!:|BREAKING CHANGE"; then
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commits" | grep -qE "^feat(\(.+\))?:"; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (from $latest_tag)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update versions
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          # Update jsr.json
          jq --arg v "$NEW_VERSION" '.version = $v' jsr.json > jsr.json.tmp
          mv jsr.json.tmp jsr.json
          # Update deno.json
          jq --arg v "$NEW_VERSION" '.version = $v' deno.json > deno.json.tmp
          mv deno.json.tmp deno.json
          echo "Updated versions:"
          echo "  package.json: $(jq -r '.version' package.json)"
          echo "  jsr.json: $(jq -r '.version' jsr.json)"
          echo "  deno.json: $(jq -r '.version' deno.json)"

      - name: Verify
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test --run

      - name: Commit and tag
        env:
          TAG: ${{ steps.version.outputs.next }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): bump version to v$VERSION"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main --follow-tags

  publish:
    name: Publish Package
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm OIDC and JSR publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Install latest npm
        run: npm install -g npm@latest

      # Publish to npm with OIDC provenance
      - name: Publish to npm
        run: npm publish --provenance --access public

      # Publish to JSR
      - name: Publish to JSR
        run: pnpx jsr publish

  release:
    name: Create Release
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
